# ═══════════════════════════════════════════════════════════════════════════════
# Pi Extension Keyboard Shortcuts
# ═══════════════════════════════════════════════════════════════════════════════
# 
# This file defines keyboard shortcuts for Pi extensions.
# 
# Format:
#   extension-name:
#     - keyId    # action-name (Description)
#     - keyId    # another-action
#
# The comment after keyId is the ACTION NAME that must match a handler
# defined in the extension code. If no action matches, the shortcut is not registered.
#
# Key ID Format: modifier+key (lowercase)
#   Modifiers: ctrl, shift, alt (combinable: ctrl+shift+x)
#   Keys: a-z, 0-9, f1-f12, escape, enter, tab, space, backspace, delete,
#         home, end, pageUp, pageDown, up, down, left, right, symbols
#
# IMPORTANT: Modifier order doesn't matter!
#   ctrl+shift+a = shift+ctrl+a = ctrl+shift+a (all normalized to ctrl+shift+a)
#
# After editing, reload with: /reload
#
# ═══════════════════════════════════════════════════════════════════════════════

# ────────────────────────────────────────────────────────────────────────────────
# Agent Team Extension (extensions/agent-team.ts)
# ────────────────────────────────────────────────────────────────────────────────
agent-team:
  - f6              # next-team (Cycle to next team)
  - f7     # prev-team (Cycle to previous team)
  - f5              # agent-team-reload (Reload agent definitions from disk)

# ────────────────────────────────────────────────────────────────────────────────
# Theme Cycler Extension (extensions/theme-cycler.ts)
# ────────────────────────────────────────────────────────────────────────────────
theme-cycler:
  - ctrl+x   # next-theme
  - ctrl+q   # prev-theme

# ────────────────────────────────────────────────────────────────────────────────
# Shortcut Diagnostic Extension (extensions/shortcut-diagnostic.ts)
# ────────────────────────────────────────────────────────────────────────────────
# Note: This extension only provides the /test-shortcuts command, no keyboard shortcuts

# Configurações do Sistema Wake Words Command

# Configurações do Wake Word Detector (Porcupine)
porcupine:
  access_key: "YOUR_ACCESS_KEY_HERE"  # Obter em: https://console.picovoice.ai/
  keyword_path: null  # null = usar wake word padrão (porcupine)
  sensitivity: 0.5    # 0.0 a 1.0 (default: 0.5)
  model_path: null    # null = usar modelo padrão

# Configurações do Speech-to-Text (Vosk)
vosk:
  model_path: "models/vosk-model-small-pt-0.3"  # Caminho do modelo
  sample_rate: 16000     # Taxa de amostragem (Hz)
  alternative: 0         # 0 = melhor resultado

# Configurações de Áudio
audio:
  device_index: null     # null = dispositivo padrão
  sample_rate: 16000     # Hz
  channels: 1            # 1 = mono, 2 = stereo
  chunk_size: 512        # Frames por chunk
  input_format: int16    # Formato do áudio

# Configurações de Comando
command:
  timeout: 5.0           # Tempo para falar comando após wake word (segundos)
  silence_threshold: 0.3 # Nível de silêncio (0.0 a 1.0)

# Configurações de Logging
logging:
  level: "INFO"          # DEBUG, INFO, WARNING, ERROR
  log_to_file: true      # Salvar logs em arquivo
  log_dir: "logs"        # Diretório dos logs
  log_file: "wake_words.log"
  max_size_mb: 10        # Tamanho máximo do log (MB)
  backup_count: 5        # Número de backups

# Configurações de Monitoramento
monitoring:
  log_cpu: true          # Monitorar CPU
  log_ram: true          # Monitorar RAM
  log_audio_level: true  # Monitorar nível do áudio
  update_interval: 1.0   # Intervalo de atualização (segundos)

# Configurações de Debug
debug:
  show_audio_devices: false  # Mostrar dispositivos de áudio ao iniciar
  log_audio_chunks: false    # Salvar chunks de áudio para debug
  verbose_output: false      # Output detalhado
